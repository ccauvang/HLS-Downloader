<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8" />
    <title>HLS Downloader — History</title>
    <link rel="stylesheet" href="history.css" />
</head>

<body>
    <div id="header">
        <span id="header-title">HLS DOWNLOADER</span>
        <span id="header-sub">History</span>
    </div>
    <div id="body">
        <input type="text" id="search" placeholder="Search filename or URL…" />
        <div id="count"></div>
        <div id="list"></div>
        <div id="empty">No downloads yet.</div>
        <div style="display:flex;justify-content:flex-end;margin-top:8px">
            <button id="clear-all-btn" title="Clear All">🗑 Clear All</button>
        </div>
    </div>
    <script src="history.js"></script>
</body>

</html>
